name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on tags like v1.0.0, v1.2.3
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v1.0.0)'
        required: true

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create GitHub Releases and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build plugin
        run: ./gradlew buildPlugin --no-daemon

      - name: Verify plugin
        run: ./gradlew verifyPlugin --no-daemon

      # ── Create a GitHub Release and attach the ZIP ─────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── (Optional) Publish to JetBrains Marketplace ───────────────────────
      # Add PUBLISH_TOKEN to your repo secrets (Settings → Secrets → Actions)
      # once your plugin is approved on the Marketplace.
      #
      # - name: Publish to JetBrains Marketplace
      #   run: ./gradlew publishPlugin --no-daemon
      #   env:
      #     PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}

